spring:
  datasource:
    driver-class-name: org.h2.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:h2:file:./bin/h2/datart.demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;IGNORECASE=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;IFEXISTS=TRUE
    username:
    password:

server:
  port: 9090
  address: 0.0.0.0

  compression:
    enabled: true
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/*

datart:

  migration:
    enable: false

  server:
    address: http://127.0.0.1:9090

  user:
    active:
      send-mail: false  # 注册用户时是否需要邮件验证激活

  security:
    token:
      secret: "d@a$t%a^r&a*t" #加密密钥
      timeout-min: 30  # 登录会话有效时长，单位：分钟。
  jump-login:
    session-timeout-min: 43200   # 跳转登录约 30 天；0 表示跟上面 security 走

  env:
    file-path: ${user.dir}/files # 服务端文件保存位置

  screenshot:
    timeout-seconds: 60
    webdriver-type: CHROME
    reuse-webdriver: true
    stabilize-ms-after-layout: 400
    stabilize-ms-before-capture: 300
    # Windows 路径在 YAML 里请用 / 或写成 \\，双引号内单个 \ 会触发转义报错
    webdriver-path: C:/Users/longs/Desktop/zhongchuliang/chromedriver-win64/chromedriver.exe