spring:
  application:
    name: datart-server

  main:
    banner-mode: off

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

  web:
    resources:
      static-locations: file:${datart.env.file-path}
      cache:
        cachecontrol:
          cache-public: true
          no-cache: true
          no-store: false

  messages:
    basename: i18n.datart_i18n

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      FAIL_ON_EMPTY_BEANS: false
      FAIL_ON_UNWRAPPED_TYPE_IDENTIFIERS: false

  quartz:
    job-store-type: jdbc
    scheduler-name: DatartScheduleCluster
    properties:
      org:
        quartz:
          scheduler:
            instancName: DatartScheduleCluster
            instanceId: AUTO
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            isClustered: true
            clusterCheckinInterval: 5000
            useProperties: true
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

mybatis:
  type-aliases-package: datart.core.entity
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true

logging:
  level:
    datart:
      core:
        mappers: info
      data.provider.jdbc: info
  config: config/logback.xml

shiro:
  web:
    enabled: false

datart:
  migration:
    enable: true

  # 外部 PG / 跳转粮温：请在对应 Spring Profile 中配置（如 application-demo.yml 的 datart.permission、datart.jump-login）
  permission:
    external-auth-source-id:
    execute-check-sql:
    test-execute-org-check-enabled: false
    test-execute-allowed-orgs-sql:
    user-org-mapping-table: public.permissions
    test-execute-org-id-min-digits: 15
    grain-view-bootstrap-sql:

  jump-login:
    session-timeout-min: 0
    auto-sync-grain-views-enabled: false
    auto-sync-grain-views-only-new-user: true
    auto-sync-grain-views-source-id:
    auto-create-source-enabled: false
    auto-create-source-name:
    auto-create-source-type: JDBC
    auto-create-source-config:

  server:
    path-prefix: /api/v1

server:
  port: 8080
  address: 0.0.0.0

  compression:
    enabled: true
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/*
